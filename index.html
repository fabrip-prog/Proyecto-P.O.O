<!DOCTYPE html>
<html>
<head>
    <title>Prueba de Reservas</title>
</head>
<body>
    <h1>Prueba de Reservas con localStorage</h1>
    
    <button onclick="agregarReserva()">➕ Agregar Reserva</button>
    <button onclick="verificarReservasGuardadas()">🔍 Ver Reservas</button>
    <button onclick="limpiarReservas()">🗑️ Limpiar</button>
    
    <div id="resultado"></div>

    <script type="module">
        import controladorReservas from './controlador/controlador.js';
        import { verificarReservasGuardadas, limpiarReservas } from './controlador/guardarStorage.js';
        
        window.agregarReserva = () => {
            controladorReservas.agregarReserva();
            console.log('Reserva agregada');
        };
        
        window.verificarReservasGuardadas = verificarReservasGuardadas;
        window.limpiarReservas = limpiarReservas;
    </script>
</body>
</html>
